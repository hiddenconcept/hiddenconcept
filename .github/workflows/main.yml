name: Generate GitHub Stats
on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:        # lets you trigger it manually too

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate stats card
        uses: anuraghazra/github-readme-stats-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: hiddenconcept
          output: 'stats.svg'
      # add a second step here for top-langs if the action supports it,
      # or run two separate actions/jobs depending on its docs
